<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>李清扬 | Portfolio</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">

<style>
:root {
    --mint: #a7f3d0;
    --bg-base: #000000;
    --glow-purple: rgba(168,85,247,0.25);
    --glow-blue: rgba(59,130,246,0.35);
}

body {
    background: var(--bg-base);
    color: #fff;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
}

/* 背景光 */
body::before, body::after {
    content:"";
    position:fixed;
    width:70vw;height:70vw;
    filter:blur(120px);
    z-index:-1;
}
body::before {
    top:-20%;left:-10%;
    background: radial-gradient(circle,var(--glow-purple),transparent);
}
body::after {
    bottom:-20%;right:-10%;
    background: radial-gradient(circle,var(--glow-blue),transparent);
}

/* slider */
.hero-slider-container { width:100vw;height:100vh;overflow:hidden;}
.hero-slider-track { display:flex;width:300vw;height:100%;transition:1s;}
.slide-item { width:100vw;height:100%;flex-shrink:0;position:relative;}

/* glass 卡片（新版） */
.glass-card {
    border-radius: 24px;
    overflow: hidden;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    transition: transform 0.35s ease;
}
.glass-card:hover {
    transform: translateY(-6px) scale(1.03);
}

/* tag */
.ins-tag {
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    padding:6px 16px;
    border-radius:999px;
    font-size:12px;
}

/* 按钮 */
.nav-glass {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(20px);
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="fixed top-0 w-full z-50 nav-glass flex justify-between px-10 py-6">
    <div class="font-black">李清扬</div>
    <button onclick="toggleLanguage()" id="langBtn">EN</button>
</nav>

<!-- HERO -->
<div class="hero-slider-container">
<div class="hero-slider-track" id="heroTrack">

<!-- 第一屏 -->
<section class="slide-item flex items-center px-10">
    <div>
        <h1 class="text-5xl font-black mb-6">工程管理硕士</h1>
        <div class="flex gap-3">
            <span class="ins-tag">KCL</span>
            <span class="ins-tag">NNU</span>
        </div>
    </div>
</section>

<!-- 第二屏 -->
<section class="slide-item flex items-center px-10">
    <h1 class="text-6xl font-black">企业履历</h1>
</section>

<!-- ✅ 第三屏（四图版本） -->
<section class="slide-item relative bg-black overflow-hidden">

<!-- 背景 -->
<div class="absolute inset-0">
    <img src="IMG_4990.JPG" class="w-full h-full object-cover scale-105">
    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/60 to-transparent"></div>
</div>

<div class="relative z-20 h-full flex items-center px-6 md:px-20">
<div class="grid lg:grid-cols-2 gap-10 w-full">

<!-- 左 -->
<div>
    <h1 class="text-5xl md:text-7xl font-black mb-6">
        跨界内容创作者
    </h1>

    <p class="text-white/70 max-w-xl">
        从工程管理到内容表达，构建跨界叙事能力。
    </p>

    <div class="flex gap-3 mt-6">
        <span class="ins-tag">职场</span>
        <span class="ins-tag">AI</span>
        <span class="ins-tag">成长</span>
    </div>
</div>

<!-- 右：四图 -->
<div class="grid grid-cols-2 gap-4">

<div class="glass-card aspect-[4/5]">
    <img src="IMG_1364.JPG">
</div>

<div class="glass-card aspect-[4/5] translate-y-8">
    <img src="IMG_4179.JPG">
</div>

<div class="glass-card aspect-[4/5] -translate-y-8">
    <img src="IMG_4173.JPG">
</div>

<div class="glass-card aspect-[4/5]">
    <img src="IMG_4990.JPG">
</div>

</div>

</div>
</div>
</section>

</div>
</div>

<!-- JS -->
<script>
let index = 0;
const track = document.getElementById('heroTrack');

function moveHeroSlide(dir){
    index = (index + dir + 3) % 3;
    track.style.transform = `translateX(-${index*100}vw)`;
}

function toggleLanguage(){
    alert("语言切换示意");
}
</script>

</body>
</html>
